<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Камера — тест</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100dvh; }
  #box { width:100vw; max-width:480px; aspect-ratio:3/4; max-height:75vh; position:relative; border-radius:12px; overflow:hidden; background:#222; }
  video, canvas { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
  #msg { position:absolute; top:10px; left:10px; color:#0f0; font:12px monospace; z-index:5; background:rgba(0,0,0,0.7); padding:4px 8px; border-radius:4px; }
</style>
</head>
<body>
<div id="box">
  <video id="v" playsinline autoplay muted></video>
  <canvas id="c"></canvas>
  <div id="msg">...</div>
</div>
<script>
const msg = (s) => { document.getElementById('msg').textContent = s; console.log(s); };
const v = document.getElementById('v');
const c = document.getElementById('c');
const cx = c.getContext('2d');

msg('Старт');

navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:840}}})
.then(stream => {
  msg('Камера ОК');
  v.srcObject = stream;
  return v.play();
})
.then(() => {
  msg('Видео играет');
  return new Promise(resolve => {
    const check = () => {
      if (v.videoWidth > 0) { msg('Размер: '+v.videoWidth+'x'+v.videoHeight); resolve(); }
      else { msg('Жду размер... readyState='+v.readyState); requestAnimationFrame(check); }
    };
    check();
  });
})
.then(() => {
  c.width = v.videoWidth;
  c.height = v.videoHeight;
  msg('Canvas: '+c.width+'x'+c.height+' — рисую!');
  function draw() {
    if (v.videoWidth > 0) {
      cx.drawImage(v, 0, 0, c.width, c.height);
    }
    requestAnimationFrame(draw);
  }
  draw();
})
.catch(e => {
  msg('ОШИБКА: '+e.message);
});
</script>
</body>
</html>
