<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Примерка кепок 👒</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    font-family: system-ui, sans-serif;
    overflow: hidden;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  #main {
    position: relative;
    width: 100vw;
    max-width: 480px;
    aspect-ratio: 3/4;
    max-height: 75vh;
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 12px;
    transform: scaleX(-1); /* mirror */
  }
  video {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 12px;
    transform: scaleX(-1);
    opacity: 0; /* video feeds into canvas only */
    pointer-events: none;
  }
  #loader {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 16px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    border-radius: 12px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: #FFD966;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #picker {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0 16px;
  }
  .cap-btn {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 3px solid #555;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
    background: transparent;
  }
  .cap-btn.active { border-color: #FFD966; transform: scale(1.15); }
  .cap-btn img { width: 100%; height: 100%; object-fit: contain; }
  #controls {
    display: flex;
    gap: 12px;
    margin-top: 12px;
  }
  button {
    background: #FFD966;
    color: #000;
    border: none;
    padding: 12px 28px;
    border-radius: 24px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    touch-action: manipulation;
  }
  button:active { opacity: 0.8; }
  #status {
    color: #aaa;
    font-size: 13px;
    margin-top: 8px;
    min-height: 20px;
  }
</style>
</head>
<body>

<div id="main">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="canvas"></canvas>
  <div id="loader"><div class="spinner"></div>Загружаю...</div>
</div>

<div id="picker"></div>
<div id="status"></div>

<script type="module">
import { FaceLandmarker, FilesetResolver } from
  'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm';

// ── Caps ──────────────────────────────────────
const caps = [
  { name: 'Чёрная',   top: '#1a1a1a', brim: '#111', band: '#333' },
  { name: 'Красная',  top: '#c0392b', brim: '#922b21', band: '#a93226' },
  { name: 'Синяя',    top: '#2471a3', brim: '#1a5276', band: '#2980b9' },
  { name: 'Бежевая',  top: '#d4b895', brim: '#b8956e', band: '#c9a87c' },
  { name: 'Зелёная',  top: '#1e8449', brim: '#145a32', band: '#239b56' },
  { name: 'Серая',    top: '#7f8c8d', brim: '#626b6c', band: '#95a5a6' },
];
let activeCap = 0;

// ── State ─────────────────────────────────────
let faceLandmarker = null;
let canvas, ctx, video;
let running = false;
let lastVideoTime = -1;

// ── Init ──────────────────────────────────────
async function init() {
  canvas = document.getElementById('canvas');
  ctx = canvas.getContext('2d');
  video = document.getElementById('video');

  buildPicker();

  // Load MediaPipe
  document.getElementById('status').textContent = 'Загружаю модель...';
  const vision = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm'
  );
  faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
      delegate: 'GPU',
    },
    runningMode: 'VIDEO',
    numFaces: 1,
    outputFaceBlendshapes: false,
    outputFacialTransformationMatrixes: false,
  });

  // Start camera
  document.getElementById('status').textContent = 'Запускаю камеру...';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 840 } }
    });
    video.srcObject = stream;
    await video.play();
  } catch (e) {
    document.getElementById('status').textContent = 'Ошибка камеры: разреши доступ';
    document.getElementById('loader').style.display = 'none';
    return;
  }

  // Wait for video dimensions
  await new Promise(r => { video.onloadedmetadata = r; });

  document.getElementById('loader').style.display = 'none';
  document.getElementById('status').textContent = 'Готово!';

  running = true;
  requestAnimationFrame(loop);
}

// ── Picker ────────────────────────────────────
function buildPicker() {
  const picker = document.getElementById('picker');
  caps.forEach((cap, i) => {
    const btn = document.createElement('div');
    btn.className = 'cap-btn' + (i === activeCap ? ' active' : '');

    // Draw preview
    const c = document.createElement('canvas');
    c.width = 60; c.height = 60;
    const cx = c.getContext('2d');
    drawCapPreview(cx, 30, 32, 48, cap);
    btn.appendChild(c);

    btn.onclick = () => {
      document.querySelectorAll('.cap-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCap = i;
    };
    picker.appendChild(btn);
  });
}

function drawCapPreview(cx, x, y, w, cap) {
  const h = w * 0.45;
  // Top dome
  cx.fillStyle = cap.top;
  cx.beginPath();
  cx.ellipse(x, y, w/2, h*0.75, 0, Math.PI, 0);
  cx.fill();
  // Band
  cx.fillStyle = cap.band;
  cx.fillRect(x - w/2, y - 2, w, h * 0.22);
  // Brim
  cx.fillStyle = cap.brim;
  cx.beginPath();
  cx.ellipse(x, y + h*0.45, w/2 + 6, h*0.35, 0, Math.PI*0.7, Math.PI*0.3);
  cx.quadraticCurveTo(x, y + h*0.85, x - w/2 - 6, y + h*0.45);
  cx.fill();
}

// ── Main loop ─────────────────────────────────
function loop() {
  if (!running) return;
  requestAnimationFrame(loop);

  if (video.currentTime === lastVideoTime) return;
  lastVideoTime = video.currentTime;

  const w = canvas.width = video.videoWidth;
  const h = canvas.height = video.videoHeight;

  // Detect
  let landmarks = null;
  try {
    const result = faceLandmarker.detectForVideo(video, performance.now());
    if (result.faceLandmarks.length > 0) {
      landmarks = result.faceLandmarks[0];
    }
  } catch (e) { /* skip */ }

  // Draw video
  ctx.save();
  ctx.clearRect(0, 0, w, h);
  ctx.drawImage(video, 0, 0, w, h);

  if (landmarks) {
    drawCap(landmarks, w, h);
    document.getElementById('status').textContent = '✅';
  } else {
    document.getElementById('status').textContent = 'Лицо не найдено';
  }

  ctx.restore();
}

// ── Draw cap ──────────────────────────────────
function drawCap(landmarks, w, h) {
  const cap = caps[activeCap];

  // Key landmarks
  const forehead = landmarks[10];        // верх лба
  const leftTemple = landmarks[234];     // левый висок
  const rightTemple = landmarks[454];    // правый висок
  const noseTip = landmarks[1];          // кончик носа

  if (!forehead || !leftTemple || !rightTemple) return;

  const fx = forehead.x * w;
  const fy = forehead.y * h;
  const lx = leftTemple.x * w;
  const ly = leftTemple.y * h;
  const rx = rightTemple.x * w;
  const ry = rightTemple.y * h;

  // Center and width
  const cx = (lx + rx) / 2;
  const cy = (ly + ry) / 2 - 8;
  const faceWidth = Math.hypot(rx - lx, ry - ly);

  // Cap dimensions
  const capWidth = faceWidth * 1.55;
  const capHeight = faceWidth * 0.65;
  const capTop = cy - capHeight * 0.55;

  // Rotation angle
  const angle = Math.atan2(ry - ly, rx - lx);

  ctx.save();
  ctx.translate(cx, capTop + capHeight * 0.15);
  ctx.rotate(angle);

  const w2 = capWidth / 2;
  const h2 = capHeight;

  // ── Dome ──
  ctx.fillStyle = cap.top;
  ctx.beginPath();
  ctx.moveTo(-w2, 0);
  ctx.quadraticCurveTo(-w2, -h2 * 0.85, -w2 * 0.15, -h2 * 0.9);
  ctx.quadraticCurveTo(0, -h2 * 1.05, w2 * 0.15, -h2 * 0.9);
  ctx.quadraticCurveTo(w2, -h2 * 0.85, w2, 0);
  ctx.closePath();
  ctx.fill();

  // ── Band ──
  const bandH = h2 * 0.18;
  ctx.fillStyle = cap.band;
  ctx.fillRect(-w2 - 1, -bandH, capWidth + 2, bandH);

  // ── Brim ──
  ctx.fillStyle = cap.brim;
  ctx.beginPath();
  ctx.moveTo(-w2 - capWidth * 0.08, 0);
  ctx.quadraticCurveTo(-w2 * 0.5, h2 * 0.35, 0, h2 * 0.48);
  ctx.quadraticCurveTo(w2 * 0.5, h2 * 0.35, w2 + capWidth * 0.08, 0);
  ctx.quadraticCurveTo(0, h2 * 0.15, -w2 - capWidth * 0.08, 0);
  ctx.fill();

  // ── Top button ──
  ctx.fillStyle = cap.band;
  ctx.beginPath();
  ctx.arc(0, -h2 * 1.02, capWidth * 0.04, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ── Start ─────────────────────────────────────
init();

</script>
</body>
</html>
