<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Примерка кепок 👒</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    font-family: system-ui, sans-serif;
    overflow: hidden;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  #main {
    position: relative;
    width: 100vw;
    max-width: 480px;
    aspect-ratio: 3/4;
    max-height: 75vh;
    background: #111;
    border-radius: 12px;
    overflow: hidden;
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }
  #debug {
    position: absolute;
    top: 8px; left: 8px;
    color: #0f0;
    font-size: 12px;
    font-family: monospace;
    z-index: 20;
    background: rgba(0,0,0,0.7);
    padding: 4px 8px;
    border-radius: 4px;
    white-space: pre-wrap;
  }
  #picker {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0 16px;
  }
  .cap-btn {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 3px solid #555;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }
  .cap-btn.active { border-color: #FFD966; transform: scale(1.15); }
  .cap-btn canvas { width: 100%; height: 100%; }
  #status {
    color: #aaa;
    font-size: 13px;
    margin-top: 8px;
    min-height: 20px;
  }
</style>
</head>
<body>

<div id="main">
  <canvas id="canvas"></canvas>
  <div id="debug">Загрузка...</div>
</div>

<div id="picker"></div>
<div id="status"></div>

<script type="module">
import { FaceLandmarker, FilesetResolver } from
  'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm';

// ── Caps ──────────────────────────────────────
const caps = [
  { name: 'Чёрная',   top: '#1a1a1a', brim: '#111', band: '#333' },
  { name: 'Красная',  top: '#c0392b', brim: '#922b21', band: '#a93226' },
  { name: 'Синяя',    top: '#2471a3', brim: '#1a5276', band: '#2980b9' },
  { name: 'Бежевая',  top: '#d4b895', brim: '#b8956e', band: '#c9a87c' },
  { name: 'Зелёная',  top: '#1e8449', brim: '#145a32', band: '#239b56' },
  { name: 'Серая',    top: '#7f8c8d', brim: '#626b6c', band: '#95a6a6' },
];
let activeCap = 0;

// ── State ─────────────────────────────────────
let faceLandmarker = null;
let canvas, ctx;
let running = false;
let debugEl;
let frameCount = 0;
let detectCount = 0;
let lastDebug = '';

function debug(msg) {
  lastDebug = msg;
  if (debugEl) debugEl.textContent = msg;
  console.log(msg);
}

// ── Init ──────────────────────────────────────
async function init() {
  canvas = document.getElementById('canvas');
  ctx = canvas.getContext('2d');
  debugEl = document.getElementById('debug');

  buildPicker();

  // Create hidden video element
  const video = document.createElement('video');
  video.setAttribute('playsinline', '');
  video.setAttribute('autoplay', '');
  video.setAttribute('muted', '');
  video.style.display = 'none';
  document.body.appendChild(video);

  // Load MediaPipe
  debug('1. Загружаю модель...');
  try {
    const vision = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm'
    );
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
        delegate: 'CPU',
      },
      runningMode: 'VIDEO',
      numFaces: 1,
      outputFaceBlendshapes: false,
      outputFacialTransformationMatrixes: false,
    });
    debug('2. Модель загружена ✅');
  } catch(e) {
    debug('ОШИБКА модели: ' + e.message);
    return;
  }

  // Start camera
  debug('3. Запускаю камеру...');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 840 } }
    });
    video.srcObject = stream;
    await video.play();
    debug('4. Камера запущена ✅');
  } catch (e) {
    debug('ОШИБКА камеры: ' + e.message);
    return;
  }

  // Wait for video dimensions
  debug('5. Жду размеры видео...');
  if (video.readyState >= 2 && video.videoWidth > 0) {
    debug('6. Размеры сразу: ' + video.videoWidth + 'x' + video.videoHeight);
  } else {
    await new Promise((resolve, reject) => {
      let tries = 0;
      const check = () => {
        tries++;
        if (video.readyState >= 2 && video.videoWidth > 0 && video.videoHeight > 0) {
          debug('6. Размеры после ' + tries + ' попыток: ' + video.videoWidth + 'x' + video.videoHeight);
          resolve();
        } else if (tries > 200) {
          reject(new Error('Таймаут: readyState=' + video.readyState + ' size=' + video.videoWidth + 'x' + video.videoHeight));
        } else {
          requestAnimationFrame(check);
        }
      };
      check();
    });
  }

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  debug('7. Canvas: ' + canvas.width + 'x' + canvas.height);

  document.getElementById('status').textContent = 'Готово!';

  // ── Main loop ─────────────────────────────────
  function loop() {
    if (!running) return;
    requestAnimationFrame(loop);
    frameCount++;

    const vw = video.videoWidth;
    const vh = video.videoHeight;
    if (vw === 0 || vh === 0) return;

    if (canvas.width !== vw || canvas.height !== vh) {
      canvas.width = vw;
      canvas.height = vh;
    }

    // Always draw video first
    ctx.save();
    ctx.clearRect(0, 0, vw, vh);
    ctx.drawImage(video, 0, 0, vw, vh);
    ctx.restore();

    // Detect face (if model ready)
    let landmarks = null;
    if (faceLandmarker) {
      try {
        const result = faceLandmarker.detectForVideo(video, performance.now());
        if (result.faceLandmarks && result.faceLandmarks.length > 0) {
          landmarks = result.faceLandmarks[0];
          detectCount++;
        }
      } catch(e) {
        // silently skip detection errors
      }
    }

    // Draw cap
    if (landmarks) {
      drawCap(landmarks, vw, vh);
    }

    // Update debug every 30 frames
    if (frameCount % 30 === 0) {
      const fps = detectCount > 0 ? '👤' : '🔍';
      debug(`Кадр:${frameCount} | ${vw}x${vh} | ${fps} лиц:${detectCount}`);
    }
  }

  running = true;
  requestAnimationFrame(loop);
}

// ── Picker ────────────────────────────────────
function buildPicker() {
  const picker = document.getElementById('picker');
  caps.forEach((cap, i) => {
    const btn = document.createElement('div');
    btn.className = 'cap-btn' + (i === activeCap ? ' active' : '');

    const c = document.createElement('canvas');
    c.width = 60; c.height = 60;
    const cx = c.getContext('2d');
    drawCapPreview(cx, 30, 32, 48, cap);
    btn.appendChild(c);

    btn.onclick = () => {
      document.querySelectorAll('.cap-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCap = i;
    };
    picker.appendChild(btn);
  });
}

function drawCapPreview(cx, x, y, w, cap) {
  const h = w * 0.45;
  cx.fillStyle = cap.top;
  cx.beginPath();
  cx.ellipse(x, y, w/2, h*0.75, 0, Math.PI, 0);
  cx.fill();
  cx.fillStyle = cap.band;
  cx.fillRect(x - w/2, y - 2, w, h * 0.22);
  cx.fillStyle = cap.brim;
  cx.beginPath();
  cx.ellipse(x, y + h*0.45, w/2 + 6, h*0.35, 0, Math.PI*0.7, Math.PI*0.3);
  cx.quadraticCurveTo(x, y + h*0.85, x - w/2 - 6, y + h*0.45);
  cx.fill();
}

// ── Draw cap ──────────────────────────────────
function drawCap(landmarks, w, h) {
  const cap = caps[activeCap];
  const forehead = landmarks[10];
  const leftTemple = landmarks[234];
  const rightTemple = landmarks[454];

  if (!forehead || !leftTemple || !rightTemple) return;

  const fx = forehead.x * w;
  const fy = forehead.y * h;
  const lx = leftTemple.x * w;
  const ly = leftTemple.y * h;
  const rx = rightTemple.x * w;
  const ry = rightTemple.y * h;

  const cx = (lx + rx) / 2;
  const cy = (ly + ry) / 2 - 8;
  const faceWidth = Math.hypot(rx - lx, ry - ly);
  const capWidth = faceWidth * 1.55;
  const capHeight = faceWidth * 0.65;
  const capTop = cy - capHeight * 0.55;
  const angle = Math.atan2(ry - ly, rx - lx);

  ctx.save();
  ctx.translate(cx, capTop + capHeight * 0.15);
  ctx.rotate(angle);

  const w2 = capWidth / 2;
  const h2 = capHeight;

  // Dome
  ctx.fillStyle = cap.top;
  ctx.beginPath();
  ctx.moveTo(-w2, 0);
  ctx.quadraticCurveTo(-w2, -h2 * 0.85, -w2 * 0.15, -h2 * 0.9);
  ctx.quadraticCurveTo(0, -h2 * 1.05, w2 * 0.15, -h2 * 0.9);
  ctx.quadraticCurveTo(w2, -h2 * 0.85, w2, 0);
  ctx.closePath();
  ctx.fill();

  // Band
  const bandH = h2 * 0.18;
  ctx.fillStyle = cap.band;
  ctx.fillRect(-w2 - 1, -bandH, capWidth + 2, bandH);

  // Brim
  ctx.fillStyle = cap.brim;
  ctx.beginPath();
  ctx.moveTo(-w2 - capWidth * 0.08, 0);
  ctx.quadraticCurveTo(-w2 * 0.5, h2 * 0.35, 0, h2 * 0.48);
  ctx.quadraticCurveTo(w2 * 0.5, h2 * 0.35, w2 + capWidth * 0.08, 0);
  ctx.quadraticCurveTo(0, h2 * 0.15, -w2 - capWidth * 0.08, 0);
  ctx.fill();

  // Top button
  ctx.fillStyle = cap.band;
  ctx.beginPath();
  ctx.arc(0, -h2 * 1.02, capWidth * 0.04, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ── Start ─────────────────────────────────────
init().catch(e => {
  debug('КРИТИЧЕСКАЯ ОШИБКА: ' + e.message);
  console.error(e);
});

</script>
</body>
</html>
