<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Примерка кепок 👒</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#111;font-family:system-ui,sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center;color:#fff;user-select:none;-webkit-user-select:none;touch-action:none;}
  h1{font-size:20px;margin:12px 0 6px;color:#FFD966;}
  #canvas-box{position:relative;width:100vw;max-width:420px;aspect-ratio:3/4;max-height:60vh;background:#222;border-radius:12px;overflow:hidden;border:1px solid #333;}
  canvas{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;}
  #placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#888;gap:16px;}
  #placeholder .icon{font-size:48px;}
  #placeholder p{font-size:14px;}
  #caps-row{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;justify-content:center;padding:0 12px;}
  .cap-btn{width:48px;height:48px;border-radius:50%;border:3px solid #444;cursor:pointer;transition:.15s;background:#222;}
  .cap-btn.sel{border-color:#FFD966;transform:scale(1.15);box-shadow:0 0 8px rgba(255,217,102,0.4);}
  #actions{display:flex;gap:10px;margin:8px 0 16px;flex-wrap:wrap;justify-content:center;}
  button{padding:12px 24px;font-size:14px;font-weight:700;border:none;border-radius:24px;cursor:pointer;touch-action:manipulation;}
  .btn-yellow{background:#FFD966;color:#000;}
  .btn-outline{background:transparent;color:#FFD966;border:2px solid #FFD966;}
  .btn-green{background:#27ae60;color:#fff;}
  #hint{color:#888;font-size:12px;text-align:center;margin-bottom:8px;min-height:18px;}
</style>
</head>
<body>
<h1>👒 Примерка кепок</h1>
<div id="canvas-box">
  <canvas id="c"></canvas>
  <div id="placeholder">
    <div class="icon">📸</div>
    <p>Загрузи фото или сделай снимок</p>
  </div>
</div>
<div id="hint"></div>
<div id="caps-row"></div>
<div id="actions">
  <input type="file" id="fileInput" accept="image/*" capture="user" style="display:none">
  <button class="btn-yellow" id="uploadBtn">📁 Загрузить фото</button>
  <button class="btn-outline" id="cameraBtn">📷 Сделать снимок</button>
  <button class="btn-green" id="downloadBtn" style="display:none">💾 Скачать</button>
</div>

<script>
const caps=[
  {name:'Чёрная',top:'#1a1a1a',brim:'#111',band:'#2a2a2a'},
  {name:'Красная',top:'#b71c1c',brim:'#7f0000',band:'#c62828'},
  {name:'Синяя',top:'#0d47a1',brim:'#002171',band:'#1565c0'},
  {name:'Бежевая',top:'#c9a87c',brim:'#a0845c',band:'#d4b896'},
  {name:'Зелёная',top:'#1b5e20',brim:'#003300',band:'#2e7d32'},
  {name:'Серая',top:'#546e7a',brim:'#37474f',band:'#607d8b'},
];
let activeCap=0, photoImg=null;
let capX=0, capY=0, capScale=1, capAngle=0;

const box=document.getElementById('canvas-box'),cv=document.getElementById('c'),cx=cv.getContext('2d');
const placeholder=document.getElementById('placeholder'),hint=document.getElementById('hint');
const fileInput=document.getElementById('fileInput');

// Build cap selector
const capsRow=document.getElementById('caps-row');
caps.forEach((cap,i)=>{
  const d=document.createElement('div');
  d.className='cap-btn'+(i===0?' sel':'');
  // Draw mini cap
  const mc=document.createElement('canvas');mc.width=48;mc.height=48;
  const mx=mc.getContext('2d');
  mx.fillStyle=cap.top;mx.beginPath();mx.ellipse(24,18,20,12,0,Math.PI,0);mx.fill();
  mx.fillStyle=cap.band;mx.fillRect(4,16,40,4);
  mx.fillStyle=cap.brim;mx.beginPath();mx.ellipse(24,30,22,8,0,Math.PI*0.7,Math.PI*0.3);mx.fill();
  d.appendChild(mc);
  d.onclick=()=>{document.querySelectorAll('.cap-btn').forEach(b=>b.classList.remove('sel'));d.classList.add('sel');activeCap=i;redraw();};
  capsRow.appendChild(d);
});

// Upload
document.getElementById('uploadBtn').onclick=()=>fileInput.click();
fileInput.onchange=e=>{
  const f=e.target.files[0];
  if(!f)return;
  const reader=new FileReader();
  reader.onload=ev=>{loadPhoto(ev.target.result);};
  reader.readAsDataURL(f);
};

// Camera
document.getElementById('cameraBtn').onclick=()=>{
  fileInput.setAttribute('capture','user');
  fileInput.click();
  fileInput.setAttribute('capture','');
};

function loadPhoto(src){
  const img=new Image();
  img.onload=()=>{
    photoImg=img;
    placeholder.style.display='none';
    // Reset cap position
    capX=0;capY=0;capScale=1;capAngle=0;
    document.getElementById('downloadBtn').style.display='inline-block';
    hint.textContent='👆 Двигай кепку. Двумя пальцами — размер и поворот';
    resizeCanvas();
    redraw();
  };
  img.src=src;
}

function resizeCanvas(){
  if(!photoImg)return;
  const boxW=box.clientWidth, boxH=box.clientHeight;
  const ratio=Math.min(boxW/photoImg.width, boxH/photoImg.height);
  cv.width=photoImg.width*ratio;
  cv.height=photoImg.height*ratio;
}

window.addEventListener('resize',()=>{resizeCanvas();redraw();});

// ── Touch gestures ──────────────────────────
let touches0=null, capStart=null;

box.addEventListener('touchstart',e=>{
  if(!photoImg){return;}
  e.preventDefault();
  const t=e.touches;
  if(t.length===1){
    touches0=null; // start drag
    capStart={x:capX, y:capY, cx:t[0].clientX, cy:t[0].clientY};
  }else if(t.length===2){
    capStart={x:capX, y:capY, scale:capScale, angle:capAngle,
      d:Math.hypot(t[1].clientX-t[0].clientX, t[1].clientY-t[0].clientY),
      a:Math.atan2(t[1].clientY-t[0].clientY, t[1].clientX-t[0].clientX)};
    touches0=null;
  }
},{passive:false});

box.addEventListener('touchmove',e=>{
  if(!photoImg||!capStart)return;
  e.preventDefault();
  const t=e.touches;
  if(t.length===1&&capStart.cx!==undefined){
    capX=capStart.x+(t[0].clientX-capStart.cx)*photoImg.width/cv.width;
    capY=capStart.y+(t[0].clientY-capStart.cy)*photoImg.height/cv.height;
  }else if(t.length===2&&capStart.d!==undefined){
    const d=Math.hypot(t[1].clientX-t[0].clientX, t[1].clientY-t[0].clientY);
    const a=Math.atan2(t[1].clientY-t[0].clientY, t[1].clientX-t[0].clientX);
    capScale=Math.max(0.3,Math.min(3, capStart.scale*d/capStart.d));
    capAngle=capStart.angle+(a-capStart.a)*180/Math.PI;
  }
  redraw();
},{passive:false});

box.addEventListener('touchend',()=>{capStart=null;});

// ── Redraw ────────────────────────────────────
function redraw(){
  if(!photoImg)return;
  cx.clearRect(0,0,cv.width,cv.height);
  // Photo
  cx.drawImage(photoImg,0,0,cv.width,cv.height);

  // Cap position in canvas coords
  const imgW=photoImg.width, imgH=photoImg.height;
  const scale=cv.width/imgW; // canvas-to-image scale
  const capW=imgW*0.5*capScale, capH=imgW*0.3*capScale;
  const cx0=cv.width/2+capX*scale;
  const cy0=cv.height*0.1+capY*scale;

  cx.save();
  cx.translate(cx0,cy0);
  cx.rotate(capAngle*Math.PI/180);
  const hw=capW/2, hh=capH;
  const cap=caps[activeCap];

  // Shadow
  cx.fillStyle='rgba(0,0,0,0.2)';
  cx.beginPath();cx.ellipse(0,hh*0.3,hw*0.9,hh*0.15,0,0,Math.PI*2);cx.fill();

  // Dome
  cx.fillStyle=cap.top;
  cx.beginPath();cx.moveTo(-hw,0);cx.quadraticCurveTo(-hw,-hh*.85,-hw*.1,-hh*.92);cx.quadraticCurveTo(0,-hh*1.08,hw*.1,-hh*.92);cx.quadraticCurveTo(hw,-hh*.85,hw,0);cx.closePath();cx.fill();
  // Highlight
  cx.fillStyle='rgba(255,255,255,0.08)';
  cx.beginPath();cx.moveTo(-hw*.3,0);cx.quadraticCurveTo(-hw*.3,-hh*.7,-hw*.05,-hh*.85);cx.quadraticCurveTo(0,-hh*.9,0,0);cx.closePath();cx.fill();

  // Band
  const bandH=hh*0.15;
  cx.fillStyle=cap.band;
  cx.fillRect(-hw-1,-bandH,capW+2,bandH);
  // Band stitch
  cx.strokeStyle='rgba(255,255,255,0.15)';
  cx.lineWidth=1;
  cx.beginPath();cx.moveTo(-hw,-bandH*0.5);cx.lineTo(hw,-bandH*0.5);cx.stroke();

  // Brim
  cx.fillStyle=cap.brim;
  cx.beginPath();cx.moveTo(-hw-capW*0.06,0);cx.quadraticCurveTo(-hw*.4,hh*.28,0,hh*.38);cx.quadraticCurveTo(hw*.4,hh*.28,hw+capW*0.06,0);cx.quadraticCurveTo(0,hh*.1,-hw-capW*0.06,0);cx.fill();
  // Brim highlight
  cx.fillStyle='rgba(255,255,255,0.05)';
  cx.beginPath();cx.moveTo(-hw*.4,0);cx.quadraticCurveTo(-hw*.2,hh*.2,0,hh*.25);cx.quadraticCurveTo(hw*.2,hh*.2,hw*.4,0);cx.quadraticCurveTo(0,hh*.05,-hw*.4,0);cx.fill();

  // Top button
  cx.fillStyle='#111';
  cx.beginPath();cx.arc(0,-hh*1.04,capW*0.03,0,Math.PI*2);cx.fill();

  cx.restore();
}

// ── Download ──────────────────────────────────
document.getElementById('downloadBtn').onclick=()=>{
  const link=document.createElement('a');
  link.download='primierka-kepki.png';
  link.href=cv.toDataURL('image/png');
  link.click();
};

</script>
</body>
</html>
