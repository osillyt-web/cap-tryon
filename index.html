<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Камера</title>
<style>
  * {margin:0;padding:0;box-sizing:border-box;}
  body {background:#000;display:flex;align-items:center;justify-content:center;height:100dvh;flex-direction:column;}
  video {width:100vw;max-width:480px;aspect-ratio:3/4;max-height:75vh;object-fit:cover;border-radius:12px;transform:scaleX(-1);background:#222;}
  button {margin-top:20px;padding:16px 40px;font-size:18px;border:none;border-radius:30px;background:#FFD966;color:#000;font-weight:700;cursor:pointer;}
  #msg {color:#fff;margin-top:10px;font:14px monospace;}
</style>
</head>
<body>
<video id="v" playsinline autoplay muted></video>
<button id="btn">Начать / Разрешить камеру</button>
<div id="msg"></div>
<script>
const v = document.getElementById('v');
const btn = document.getElementById('btn');
const msg = document.getElementById('msg');

function log(s) { msg.textContent = s; console.log(s); }

btn.onclick = function() {
  log('Запрашиваю камеру...');
  navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:840}}})
  .then(function(stream) {
    log('Поток получен!');
    v.srcObject = stream;
    return v.play();
  })
  .then(function() {
    log('Видео играет! Размер: '+v.videoWidth+'x'+v.videoHeight);
    btn.style.display = 'none';
  })
  .catch(function(e) {
    log('ОШИБКА: '+e.name+' - '+e.message);
  });
};
</script>
</body>
</html>
