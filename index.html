<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Примерка кепок 👒</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,sans-serif;}
  #box{width:100vw;max-width:480px;aspect-ratio:3/4;max-height:70vh;position:relative;border-radius:12px;overflow:hidden;background:#111;}
  canvas{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;}
  #ui{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5;border-radius:12px;background:rgba(0,0,0,0.85);gap:10px;padding:20px;}
  #ui button{padding:16px 40px;font-size:17px;font-weight:700;border:none;border-radius:30px;background:#FFD966;color:#000;cursor:pointer;}
  #log{position:absolute;top:8px;left:8px;z-index:15;color:#0f0;font:12px monospace;white-space:pre-line;background:rgba(0,0,0,0.75);padding:6px 10px;border-radius:6px;max-width:90%;}
  #picker{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;justify-content:center;}
  .c{width:50px;height:50px;border-radius:50%;border:3px solid #555;cursor:pointer;transition:.15s;}
  .c.sel{border-color:#FFD966;transform:scale(1.15);}
</style>
</head>
<body>
<div id="box">
  <canvas id="c"></canvas>
  <div id="log"></div>
  <div id="ui">
    <p style="color:#FFD966;font-size:18px;font-weight:700;">👒 Примерка кепок</p>
    <p style="color:#fff;font-size:14px;">Разреши камеру и примерь!</p>
    <p style="color:#aaa;font-size:12px;">⚠️ Выбери <b style="color:#fff;">«Разрешить, когда я на сайте»</b></p>
    <button id="btn">🎥 Включить камеру</button>
  </div>
</div>
<div id="picker"></div>
<script>
const c=document.getElementById('c'),cx=c.getContext('2d');
const btn=document.getElementById('btn'),ui=document.getElementById('ui'),logEl=document.getElementById('log');
let caps=['#1a1a1a','#c0392b','#2471a3','#d4b895','#1e8449','#7f8c8d'];
let active=0, running=false, lm=null, stream=null, video=null, frameN=0;

function log(s){logEl.textContent=(logEl.textContent||'')+s+'\n';console.log(s);}

caps.forEach((clr,i)=>{
  const d=document.createElement('div');
  d.className='c'+(i===0?' sel':'');
  d.style.background=clr;
  d.onclick=()=>{document.querySelectorAll('.c').forEach(e=>e.classList.remove('sel'));d.classList.add('sel');active=i;};
  document.getElementById('picker').appendChild(d);
});

// Auto-start
(async function auto(){
  log('🚀 Авто-старт...');
  if(!navigator.mediaDevices){log('❌ Нет mediaDevices');return;}
  try{
    log('📷 getUserMedia...');
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:840}}});
    log('✅ Поток получен');
    await startVideo();
  }catch(e){
    log('⏳ Жду нажатия кнопки ('+e.name+')');
  }
})();

btn.onclick=async function(){
  btn.textContent='⏳ Жди...';btn.disabled=true;
  log('📷 getUserMedia (по клику)...');
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:840}}});
    log('✅ Поток получен');
    await startVideo();
  }catch(e){
    log('❌ Ошибка: '+e.name);
    btn.textContent='🎥 Попробовать снова';btn.disabled=false;
  }
};

async function startVideo(){
  // Create video element dynamically
  video=document.createElement('video');
  video.setAttribute('playsinline','');
  video.setAttribute('autoplay','');
  video.setAttribute('muted','');
  video.srcObject=stream;
  log('▶️ play...');
  try{await video.play();log('✅ play ок');}catch(e){log('play error: '+e.message);}

  log('⏳ Жду размер...');
  await new Promise(resolve=>{
    const check=()=>{if(video.videoWidth>0)resolve();else requestAnimationFrame(check);};
    check();
  });
  log('✅ Размер: '+video.videoWidth+'x'+video.videoHeight);
  c.width=video.videoWidth; c.height=video.videoHeight;
  ui.style.display='none';
  running=true;

  // Load MediaPipe
  log('🤖 Гружу ИИ...');
  import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm').then(async m=>{
    const vision=await m.FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm');
    lm=await m.FaceLandmarker.createFromOptions(vision,{
      baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',delegate:'CPU'},
      runningMode:'VIDEO',numFaces:1,outputFaceBlendshapes:false,outputFacialTransformationMatrixes:false
    });
    log('✅ ИИ готов!');
  }).catch(e=>log('❌ ИИ ошибка: '+e.message));

  // Use requestVideoFrameCallback for live video sync
  function onFrame(now, metadata) {
    if(!running)return;
    video.requestVideoFrameCallback(onFrame);
    frameN++;
    // Draw mirrored video
    cx.save();
    cx.setTransform(-1,0,0,1,c.width,0);
    cx.drawImage(video,0,0,c.width,c.height);
    cx.setTransform(1,0,0,1,0,0);
    // Detect & draw cap
    if(lm){try{const r=lm.detectForVideo(video,performance.now());if(r.faceLandmarks?.length>0)drawCap(r.faceLandmarks[0]);}catch(e){}}
    cx.restore();
  }
  video.requestVideoFrameCallback(onFrame);
  log('📹 Живое видео запущено');
}

function drawCap(lm){
  const f=lm[10],lt=lm[234],rt=lm[454],le=lm[33],re=lm[263];
  if(!f||!lt||!rt||!le||!re)return;
  const headW=Math.hypot(rt.x*c.width-lt.x*c.width, rt.y*c.height-lt.y*c.height);
  const eyeDist=Math.hypot(re.x*c.width-le.x*c.width, re.y*c.height-le.y*c.height);
  const cw=headW*1.3, ch=headW*0.6;
  const cx0=(lt.x*c.width+rt.x*c.width)/2;
  const cy0=f.y*c.height - eyeDist*1.2;
  const ang=Math.atan2(rt.y*c.height-lt.y*c.height, rt.x*c.width-lt.x*c.width);
  cx.save();cx.translate(cx0,cy0);cx.rotate(ang);
  const hw=cw/2, hh=ch;
  cx.fillStyle=caps[active];cx.beginPath();cx.moveTo(-hw,0);cx.quadraticCurveTo(-hw,-hh*.85,-hw*.15,-hh*.9);cx.quadraticCurveTo(0,-hh*1.05,hw*.15,-hh*.9);cx.quadraticCurveTo(hw,-hh*.85,hw,0);cx.closePath();cx.fill();
  cx.fillStyle='rgba(255,255,255,0.25)';cx.fillRect(-hw-1,-hh*.16,cw+2,hh*.16);
  cx.fillStyle='#111';cx.beginPath();cx.moveTo(-hw-cw*.06,0);cx.quadraticCurveTo(-hw*.4,hh*.3,0,hh*.4);cx.quadraticCurveTo(hw*.4,hh*.3,hw+cw*.06,0);cx.quadraticCurveTo(0,hh*.1,-hw-cw*.06,0);cx.fill();
  cx.fillStyle='#333';cx.beginPath();cx.arc(0,-hh*1.02,cw*.035,0,Math.PI*2);cx.fill();
  cx.restore();
}
</script>
</body>
</html>
